# -------------------------------------------------------
# Guaranteed Explosive Picks - Tunable Thresholds
# -------------------------------------------------------
guaranteed.min.price=3.00
guaranteed.max.price=30.00
guaranteed.min.volume=1000000
# Minimum winning-path score (0-100) to qualify
guaranteed.min.path.score=65
# Path A (Oversold Bounce): RSI must be <= this
guaranteed.path.a.rsi.max=35
# Path B (Momentum Pop): RSI must be in [min, max]
guaranteed.path.b.rsi.min=45
guaranteed.path.b.rsi.max=65
# Minimum factors passed in the winning path (max 5 per path)
guaranteed.min.factors=3
# Days after pick date to check performance
guaranteed.tracking.days=10



