<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MySwan - Options</title>
    <link href="https://unpkg.com/tabulator-tables@5.5.2/dist/css/tabulator.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #f1f5f9;
            min-height: 100vh;
            padding: 10px;
        }

        .container { max-width: 100%; margin: 0 auto; }

        h1 {
            text-align: center;
            margin-bottom: 10px;
            color: #3b82f6;
            font-size: 1.5rem;
        }

        .toolbar {
            display: flex;
            gap: 6px;
            margin-bottom: 10px;
            flex-wrap: wrap;
            align-items: center;
        }

        .btn {
            padding: 6px 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            font-size: 12px;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn-primary { background: #3b82f6; color: white; }
        .btn-primary:hover { background: #2563eb; transform: translateY(-2px); box-shadow: 0 4px 12px rgba(59,130,246,0.4); }

        .btn-success { background: #10b981; color: white; }
        .btn-success:hover { background: #059669; }

        .btn-secondary { background: rgba(148,163,184,0.2); color: #f1f5f9; border: 1px solid #475569; }
        .btn-secondary:hover { background: rgba(148,163,184,0.3); }

        .btn-ghost { background: transparent; color: #94a3b8; border: 1px solid #475569; }
        .btn-ghost:hover { background: rgba(148,163,184,0.1); }

        .info { text-align: center; margin-top: 5px; color: #94a3b8; font-size: 11px; }

        .back-link { display: inline-block; margin-bottom: 8px; color: #3b82f6; text-decoration: none; font-weight: 500; font-size: 12px; }
        .back-link:hover { text-decoration: underline; }


        /* Tabulator Dark Theme */
        .tabulator {
            background: #1e293b;
            border: 1px solid #334155;
            font-size: 11px;
        }
        .tabulator .tabulator-header { background: #0f172a; border-bottom: 2px solid #3b82f6; }
        .tabulator .tabulator-header .tabulator-col {
            background: #0f172a;
            color: #f1f5f9;
            border-right: 1px solid #334155;
            padding: 6px 4px;
            font-size: 11px;
        }
        .tabulator .tabulator-tableholder .tabulator-table { color: #f1f5f9; }
        .tabulator-row { background: #1e293b; border-bottom: 1px solid #334155; min-height: 28px; color: #f1f5f9; }
        .tabulator-row.tabulator-row-even { background: #1a2332; }
        .tabulator-row.tabulator-row-odd { background: #1e293b; }
        .tabulator-row:hover { background: #334155 !important; color: #f1f5f9 !important; cursor: pointer; }
        .tabulator-cell { border-right: 1px solid #334155; padding: 4px 6px; font-size: 11px; color: #f1f5f9; }
    </style>
</head>
<body>
<div class="container">
    <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>

    <h1><i class="fas fa-square-poll-horizontal"></i> Options</h1>

    <div class="toolbar">
        <button class="btn btn-success" onclick="refreshOptions()">
            <i class="fas fa-arrows-rotate"></i> Refresh Options
        </button>
        <button class="btn btn-ghost" onclick="clearFilters()">
            <i class="fas fa-eraser"></i> Clear Filters
        </button>
        <button class="btn btn-secondary" onclick="exportToExcel()">
            <i class="fas fa-file-excel"></i> Export
        </button>
    </div>


    <div id="optionsTable"></div>
    <div class="info" id="info"></div>
</div>

<script src="https://unpkg.com/tabulator-tables@5.5.2/dist/js/tabulator.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script>
    const API_BASE = 'http://jpmaxtricks.com:8070/api';
    let table;

    function customNumberFilter(headerValue, rowValue, rowData, filterParams) {
        if (!headerValue || headerValue.trim() === '') return true;
        const filterStr = headerValue.trim();
        const cellValue = parseFloat(rowValue);
        if (isNaN(cellValue)) return false;
        if (filterStr.startsWith('>=')) return cellValue >= parseFloat(filterStr.substring(2));
        if (filterStr.startsWith('<=')) return cellValue <= parseFloat(filterStr.substring(2));
        if (filterStr.startsWith('>'))  return cellValue >  parseFloat(filterStr.substring(1));
        if (filterStr.startsWith('<'))  return cellValue <  parseFloat(filterStr.substring(1));
        if (filterStr.startsWith('='))  return cellValue === parseFloat(filterStr.substring(1));
        const n = parseFloat(filterStr);
        return isNaN(n) ? true : cellValue === n;
    }

    function numFmt(cell) {
        const v = cell.getValue();
        return (v === null || v === undefined) ? '-' : Number(v).toFixed(2);
    }

    function signedFmt(cell) {
        const v = cell.getValue();
        if (v === null || v === undefined || v === 0) return '-';
        const color  = v > 0 ? '#22c55e' : '#ef4444';
        const arrow  = v > 0 ? '▲' : '▼';
        return `<span style="color:${color}; font-weight:600;">${arrow} ${Math.abs(v).toFixed(2)}</span>`;
    }

    function intFmt(cell) {
        const v = cell.getValue();
        return (v === null || v === undefined) ? '-' : Number(v).toLocaleString();
    }

    function badgeFmt(cell) {
        const v = (cell.getValue() || '').toUpperCase();
        if (!v) return '-';
        const color = v === 'CALL' ? '#22c55e' : v === 'PUT' ? '#ef4444' : '#94a3b8';
        return `<span style="background:${color}33; color:${color}; padding:2px 8px; border-radius:999px; font-weight:700; font-size:10px;">${v}</span>`;
    }

    document.addEventListener('DOMContentLoaded', function () {
        table = new Tabulator('#optionsTable', {
            layout: 'fitData',
            height: 'calc(100vh - 180px)',
            pagination: true,
            paginationSize: 100,
            paginationSizeSelector: [50, 100, 200, 500],
            placeholder: 'Loading options...',
            initialSort: [{ column: 'change', dir: 'asc' }],
            columns: [
                { title: 'Ticker',     field: 'ticker',          width: 100,  headerFilter: 'input',
                  formatter: function(cell) {
                    const v = cell.getValue();
                    if (!v) return '-';
                    const row = cell.getRow().getData();
                    const longP  = row?.stock?.noOfLongPatterns  || 0;
                    const shortP = row?.stock?.noOfShortPatterns || 0;
                    let html = `<strong style="color:#3b82f6;">${v}</strong>`;
                    if (longP > 0 || shortP > 0) {
                        html += ` <a href="patterns.html?ticker=${encodeURIComponent(v)}" target="_blank" style="text-decoration:none;" onclick="event.stopPropagation();">`;
                        if (longP  > 0) html += `<span style="display:inline-block;background:#10b981;color:white;font-size:9px;padding:2px 5px;border-radius:3px;font-weight:700;margin-left:3px;">L${longP}</span>`;
                        if (shortP > 0) html += `<span style="display:inline-block;background:#ef4444;color:white;font-size:9px;padding:2px 5px;border-radius:3px;font-weight:700;margin-left:2px;">S${shortP}</span>`;
                        html += `</a>`;
                    }
                    return html;
                  }
                },
                { title: 'Name',       field: 'optionName',      width: 110, headerFilter: 'input' },
                { title: 'Type',       field: 'type',            width: 70,  headerFilter: 'list',
                  headerFilterParams: { values: { '': 'All', CALL: 'CALL', PUT: 'PUT' } }, formatter: badgeFmt },
                { title: 'D±',      field: 'daysUpDown',      width: 50,  hozAlign: 'center',
                  headerFilter: 'input', headerFilterFunc: customNumberFilter,
                  formatter: function(cell) {
                    const v = cell.getValue();
                    if (!v) return '-';
                    const color = v > 0 ? '#22c55e' : v < 0 ? '#ef4444' : '#e2e8f0';
                    return `<span style="color:${color}; font-weight:600;">${v > 0 ? '+' : ''}${v}</span>`;
                  }
                },
                { title: 'AddPr', field: 'priceOnAdd',   width: 70, headerFilter: 'input', headerFilterFunc: customNumberFilter, formatter: numFmt },
                { title: 'Price',      field: 'price',           width: 70,  headerFilter: 'input', headerFilterFunc: customNumberFilter, formatter: numFmt },
                { title: 'Chg',     field: 'change',          width: 70,  headerFilter: 'input', headerFilterFunc: customNumberFilter, formatter: signedFmt, sorter: 'number' },
                { title: 'High',       field: 'high',            width: 80,  headerFilter: 'input', headerFilterFunc: customNumberFilter, formatter: numFmt },
                { title: 'Low',        field: 'low',             width: 80,  headerFilter: 'input', headerFilterFunc: customNumberFilter, formatter: numFmt },
                { title: 'Vol',     field: 'volume',          width: 80,  headerFilter: 'input', headerFilterFunc: customNumberFilter, formatter: intFmt },
                { title: 'OpInt',   field: 'openInterest',    width: 80,  headerFilter: 'input', headerFilterFunc: customNumberFilter, formatter: intFmt },
                { title: 'Botm',     field: 'stock.bottom.bottom',          width: 55, hozAlign: 'center', headerFilter: 'input', headerFilterPlaceholder: 'true',
                  formatter: function(cell){ const v = cell.getValue(); return (v === true || v === 'true') ? '✅' : ''; }
                },
                { title: 'Spike',    field: 'stock.spike.spikeLikely',      width: 55, hozAlign: 'center', headerFilter: 'input', headerFilterPlaceholder: 'true',
                  formatter: function(cell){ const v = cell.getValue(); return (v === true || v === 'true') ? '✅' : ''; }
                },
                { title: 'OvrSold',  field: 'stock.oversold.oversoldBounce', width: 70, hozAlign: 'center', headerFilter: 'input', headerFilterPlaceholder: 'true',
                  formatter: function(cell){ const v = cell.getValue(); return (v === true || v === 'true') ? '✅' : ''; }
                },
                { title: 'Delta',      field: 'delta',           width: 70,  headerFilter: 'input', headerFilterFunc: customNumberFilter, formatter: numFmt },
                { title: 'Gamma',      field: 'gamma',           width: 75,  headerFilter: 'input', headerFilterFunc: customNumberFilter, formatter: numFmt },
                { title: 'Theta',      field: 'theta',           width: 70,  headerFilter: 'input', headerFilterFunc: customNumberFilter, formatter: numFmt },
                { title: 'Vega',       field: 'vega',            width: 70,  headerFilter: 'input', headerFilterFunc: customNumberFilter, formatter: numFmt },
                { title: 'IV',         field: 'iv',              width: 65,  headerFilter: 'input', headerFilterFunc: customNumberFilter, formatter: numFmt },
                { title: 'StkPr',  field: 'stock.price',     width: 65,  headerFilter: 'input', headerFilterFunc: customNumberFilter, formatter: numFmt },
                { title: 'StkChg',   field: 'stock.change',     width: 65,  headerFilter: 'input', headerFilterFunc: customNumberFilter, formatter: signedFmt },
            ]
        });

        table.on('dataLoaded', updateInfo);
        table.on('dataFiltered', updateInfo);
        table.on('rowClick', function(e, row) {
            const optionId = row.getData().optionId;
            if (optionId) {
                window.open(`options-history.html?optionId=${encodeURIComponent(optionId)}`, '_blank');
            }
        });

        loadOptions();
    });

    async function loadOptions() {
        try {
            document.getElementById('info').textContent = 'Loading...';
            const res = await fetch(`${API_BASE}/options/list`);
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const data = await res.json();
            table.replaceData(Array.isArray(data) ? data : []);
        } catch (err) {
            console.error(err);
            document.getElementById('info').textContent = 'Error: ' + err.message;
        }
    }

    async function refreshOptions() {
        if (!confirm('Refresh options using the stored Robinhood token and URL?')) return;
        document.getElementById('info').textContent = 'Refreshing...';
        try {
            const res = await fetch(`${API_BASE}/external/options/getOptions`, { method: 'POST' });
            const msg = await res.text();
            alert(msg);
            await loadOptions();
        } catch (err) {
            alert('Refresh failed: ' + err.message);
        }
    }

    function clearFilters() {
        if (table) { table.clearFilter(true); table.clearHeaderFilter(); }
    }

    function exportToExcel() {
        if (table) table.download('xlsx', `options-${new Date().toISOString().slice(0,10)}.xlsx`, { sheetName: 'Options' });
    }

    function updateInfo() {
        const total    = table.getData().length;
        const filtered = table.getDataCount('active');
        document.getElementById('info').textContent = `Options: ${total} | Filtered: ${filtered}`;
    }
</script>
</body>
</html>
