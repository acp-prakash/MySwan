<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Option History – MySwan</title>
    <link href="https://unpkg.com/tabulator-tables@5.5.2/dist/css/tabulator.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #f1f5f9;
            min-height: 100vh;
            padding: 10px;
        }
        .container { max-width: 100%; margin: 0 auto; }
        h1 { text-align: center; margin-bottom: 4px; color: #3b82f6; font-size: 1.4rem; }
        .sub { text-align: center; color: #94a3b8; font-size: 12px; margin-bottom: 10px; }
        .toolbar { display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; align-items: center; }
        .btn { padding: 6px 12px; border: none; border-radius: 4px; cursor: pointer; font-weight: 600; font-size: 12px; display: inline-flex; align-items: center; gap: 6px; }
        .btn-secondary { background: rgba(148,163,184,0.2); color: #f1f5f9; border: 1px solid #475569; }
        .btn-secondary:hover { background: rgba(148,163,184,0.3); }
        .back-link { display: inline-block; margin-bottom: 8px; color: #3b82f6; text-decoration: none; font-weight: 500; font-size: 12px; }
        .back-link:hover { text-decoration: underline; }
        .info { text-align: center; margin-top: 5px; color: #94a3b8; font-size: 11px; }

        .tabulator { background: #1e293b; border: 1px solid #334155; font-size: 11px; }
        .tabulator .tabulator-header { background: #0f172a; border-bottom: 2px solid #3b82f6; }
        .tabulator .tabulator-header .tabulator-col { background: #0f172a; color: #f1f5f9; border-right: 1px solid #334155; padding: 6px 4px; font-size: 11px; }
        .tabulator .tabulator-tableholder .tabulator-table { color: #f1f5f9; }
        .tabulator-row { background: #1e293b; border-bottom: 1px solid #334155; min-height: 28px; color: #f1f5f9; }
        .tabulator-row.tabulator-row-even { background: #1a2332; }
        .tabulator-row:hover { background: #334155 !important; color: #f1f5f9 !important; }
        .tabulator-cell { border-right: 1px solid #334155; padding: 4px 6px; font-size: 11px; color: #f1f5f9; }
    </style>
</head>
<body>
<div class="container">
    <a href="options.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Options</a>

    <h1><i class="fas fa-clock-rotate-left"></i> Option History</h1>
    <div class="sub" id="subtitle">Loading...</div>

    <div class="toolbar">
        <button class="btn btn-secondary" onclick="exportToExcel()">
            <i class="fas fa-file-excel"></i> Export
        </button>
    </div>

    <div id="historyTable"></div>
    <div class="info" id="info"></div>
</div>

<script src="https://unpkg.com/tabulator-tables@5.5.2/dist/js/tabulator.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script>
    const API_BASE = 'http://jpmaxtricks.com:8070/api';
    let table;

    function getParam(name) {
        return new URLSearchParams(window.location.search).get(name);
    }

    function numFmt(cell) {
        const v = cell.getValue();
        return (v === null || v === undefined) ? '-' : Number(v).toFixed(2);
    }

    function signedFmt(cell) {
        const v = cell.getValue();
        if (v === null || v === undefined || v === 0) return '-';
        const color = v > 0 ? '#22c55e' : '#ef4444';
        const arrow = v > 0 ? '▲' : '▼';
        return `<span style="color:${color}; font-weight:600;">${arrow} ${Math.abs(v).toFixed(2)}</span>`;
    }

    function intFmt(cell) {
        const v = cell.getValue();
        return (v === null || v === undefined) ? '-' : Number(v).toLocaleString();
    }

    function badgeFmt(cell) {
        const v = (cell.getValue() || '').toUpperCase();
        if (!v) return '-';
        const color = v === 'CALL' ? '#22c55e' : v === 'PUT' ? '#ef4444' : '#94a3b8';
        return `<span style="background:${color}33; color:${color}; padding:2px 8px; border-radius:999px; font-weight:700; font-size:10px;">${v}</span>`;
    }

    function daysFmt(cell) {
        const v = cell.getValue();
        if (!v) return '-';
        const color = v > 0 ? '#22c55e' : v < 0 ? '#ef4444' : '#e2e8f0';
        return `<span style="color:${color}; font-weight:600;">${v > 0 ? '+' : ''}${v}</span>`;
    }

    document.addEventListener('DOMContentLoaded', async function () {
        const optionId = getParam('optionId');
        if (!optionId) {
            document.getElementById('subtitle').textContent = 'Missing optionId parameter.';
            return;
        }

        table = new Tabulator('#historyTable', {
            layout: 'fitData',
            height: 'calc(100vh - 160px)',
            pagination: true,
            paginationSize: 100,
            paginationSizeSelector: [50, 100, 200],
            placeholder: 'No history found.',
            initialSort: [{ column: 'histDate', dir: 'desc' }],
            columns: [
                { title: 'Date',         field: 'histDate',       width: 100, headerFilter: 'input' },
                { title: 'Ticker',       field: 'ticker',         width: 80,  headerFilter: 'input',
                  formatter: function(cell) { const v = cell.getValue(); return v ? `<strong style="color:#3b82f6;">${v}</strong>` : '-'; }
                },
                { title: 'Name',         field: 'optionName',     width: 140, headerFilter: 'input' },
                { title: 'Type',         field: 'type',           width: 75,  headerFilter: 'list',
                  headerFilterParams: { values: { '': 'All', CALL: 'CALL', PUT: 'PUT' } }, formatter: badgeFmt },
                { title: 'Days±',        field: 'daysUpDown',     width: 65,  hozAlign: 'center', formatter: daysFmt },
                { title: 'Price On Add', field: 'priceOnAdd',     width: 105, formatter: numFmt },
                { title: 'Price',        field: 'price',          width: 80,  formatter: numFmt },
                { title: 'Change',       field: 'change',         width: 85,  formatter: signedFmt, sorter: 'number' },
                { title: 'High',         field: 'high',           width: 80,  formatter: numFmt },
                { title: 'Low',          field: 'low',            width: 80,  formatter: numFmt },
                { title: 'Volume',       field: 'volume',         width: 85,  formatter: intFmt },
                { title: 'Open Int',     field: 'openInterest',   width: 85,  formatter: intFmt },
                { title: 'Botm',     field: 'stock.bottom.bottom',           width: 55, hozAlign: 'center', headerFilter: 'input', headerFilterPlaceholder: 'true',
                  formatter: function(cell){ const v = cell.getValue(); return (v === true || v === 'true') ? '✅' : ''; }
                },
                { title: 'Spike',    field: 'stock.spike.spikeLikely',       width: 55, hozAlign: 'center', headerFilter: 'input', headerFilterPlaceholder: 'true',
                  formatter: function(cell){ const v = cell.getValue(); return (v === true || v === 'true') ? '✅' : ''; }
                },
                { title: 'OvrSold',  field: 'stock.oversold.oversoldBounce', width: 70, hozAlign: 'center', headerFilter: 'input', headerFilterPlaceholder: 'true',
                  formatter: function(cell){ const v = cell.getValue(); return (v === true || v === 'true') ? '✅' : ''; }
                },
                { title: 'Delta',        field: 'delta',          width: 75,  formatter: numFmt },
                { title: 'Gamma',        field: 'gamma',          width: 75,  formatter: numFmt },
                { title: 'Theta',        field: 'theta',          width: 75,  formatter: numFmt },
                { title: 'Vega',         field: 'vega',           width: 75,  formatter: numFmt },
                { title: 'IV',           field: 'iv',             width: 75,  formatter: numFmt },
            ]
        });

        table.on('dataLoaded', updateInfo);
        table.on('dataFiltered', updateInfo);

        await loadHistory(optionId);
    });

    async function loadHistory(optionId) {
        document.getElementById('info').textContent = 'Loading...';
        try {
            const res = await fetch(`${API_BASE}/options/history/byOptionId/${encodeURIComponent(optionId)}`);
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const data = await res.json();
            table.replaceData(Array.isArray(data) ? data : []);
            const first = Array.isArray(data) && data.length > 0 ? data[0] : null;
            const label = first ? `${first.ticker} — ${first.optionName || optionId}` : optionId;
            document.getElementById('subtitle').textContent = label;
            document.title = `Option History – ${label}`;
        } catch (err) {
            console.error(err);
            document.getElementById('info').textContent = 'Error: ' + err.message;
        }
    }

    function updateInfo() {
        const total    = table.getData().length;
        const filtered = table.getDataCount('active');
        document.getElementById('info').textContent = `History: ${total} rows | Filtered: ${filtered}`;
    }

    function exportToExcel() {
        const optionId = getParam('optionId') || 'option';
        if (table) table.download('xlsx', `option-history-${optionId}.xlsx`, { sheetName: 'History' });
    }
</script>
</body>
</html>
